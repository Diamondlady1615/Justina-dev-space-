<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Facts Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fact-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 5px solid #667eea;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fact-text {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fact-number {
            color: #667eea;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Random Facts</h1>
        
        <div class="fact-box">
            <div class="fact-text" id="factDisplay">Click the button to get a random fact!</div>
        </div>

        <button onclick="getRandomFact()">Get New Fact</button>
        <div class="fact-number">Fact: <span id="factCount">0</span></div>
    </div>

    <script>
        const facts = [
            "Honey never spoils. Archaeologists have found 3,000-year-old honey in Egyptian tombs that was still perfectly edible!",
            "A group of flamingos is called a 'flamboyance'.",
            "Octopuses have three hearts and blue blood.",
            "Bananas are berries, but strawberries aren't.",
            "The Great Wall of China is not visible from space with the naked eye.",
            "A day on Venus is longer than a year on Venus.",
            "Cleopatra lived closer to the moon landing than to the building of the Great Pyramid.",
            "Wombat poop is cube-shaped to prevent it from rolling away.",
            "Dolphins have names for each other.",
            "The Eiffel Tower grows taller in the summer due to thermal expansion.",
            "A shrimp's heart is in its head.",
            "Butterflies taste with their feet.",
            "The fingerprints of koalas are so similar to humans that they could confuse crime scenes.",
            "Penguins propose to their mates with a pebble.",
            "A group of crows is called a 'murder'.",
            "Sloths only defecate once a week.",
            "Polar bears have black skin under their white fur.",
            "The shortest war in history lasted 38 minutes.",
            "Scotland's national animal is a unicorn.",
            "Cats have a third eyelid called the nictitating membrane.",
            "An ostrich's eye is bigger than its brain.",
            "Snakes smell with their tongues.",
            "Ketchup was once used as medicine.",
            "Peanuts are not nuts; they're legumes.",
            "The flea can jump 350 times its body length.",
            "A cockroach can live for a week without its head.",
            "Chameleons move their eyes independently.",
            "A giraffe's tongue is up to 20 inches long.",
            "Seahorses are monogamous and mate for life.",
            "The human nose can detect over 1 trillion different scents."
        ];

        let factCount = 0;
        let lastFactIndex = -1;

        function getRandomFact() {
            let randomIndex;
            
            // Ensure we don't repeat the last fact
            do {
                randomIndex = Math.floor(Math.random() * facts.length);
            } while (randomIndex === lastFactIndex && facts.length > 1);
            
            lastFactIndex = randomIndex;
            factCount++;
            
            const factDisplay = document.getElementById('factDisplay');
            factDisplay.style.opacity = '0';
            
            setTimeout(() => {
                factDisplay.textContent = facts[randomIndex];
                factDisplay.style.opacity = '1';
                document.getElementById('factCount').textContent = factCount;
            }, 300);
        }

        // Add smooth transition
        const style = document.createElement('style');
        style.textContent = `
            #factDisplay {
                transition: opacity 0.3s ease-in-out;
            }
        `;
        document.head.appendChild(style);

        // Load a fact on page load
        window.addEventListener('load', getRandomFact);
    </script>
</body>
</html>
